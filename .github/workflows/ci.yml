name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test?schema=public
          NEXTAUTH_SECRET: test-secret-key-must-be-at-least-32-characters-long
          NEXTAUTH_URL: http://localhost:3000
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          ENCRYPTION_KEY: test-encryption-key-must-be-32-chars-min
          ENCRYPTION_SALT: test-salt-must-be-16-chars-min