<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overrides — Omnysync</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-background text-foreground">
    <div class="p-8" id="app">
      <!-- AdminPageHeader -->
      <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between mb-8">
        <div class="space-y-1">
          <h1 class="text-3xl font-bold tracking-tight" data-testid="page-title">Overrides</h1>
          <p class="text-sm text-muted-foreground" data-testid="page-description">3 overrides</p>
        </div>
        <a
          href="/admin/overrides/new"
          class="inline-flex items-center justify-center rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 bg-primary text-primary-foreground hover:bg-primary/90 h-9 px-3"
        >
          New Override
        </a>
      </div>

      <!-- Filter -->
      <div class="relative mb-6 max-w-sm">
        <input
          type="text"
          id="filter-input"
          placeholder="Filter by Organization ID..."
          class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 pl-10 text-sm ring-offset-background file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50"
          data-testid="filter-input"
        />
        <svg
          class="absolute left-3 top-1/2 -translate-y-1/2 h-4 w-4 text-muted-foreground"
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
          />
        </svg>
      </div>

      <!-- Error banner -->
      <div
        id="error-banner"
        class="hidden flex items-center gap-3 p-4 mb-6 rounded-lg border border-red-500/50 bg-red-50 text-red-600 text-sm"
        data-testid="error-banner"
      >
        <span id="error-message" data-testid="error-message"></span>
        <button
          id="retry-btn"
          class="ml-auto text-sm font-medium underline hover:no-underline"
          data-testid="retry-btn"
        >
          Retry
        </button>
      </div>

      <!-- Table -->
      <div class="space-y-4">
        <div class="relative w-full overflow-auto rounded-md border">
          <table class="w-full caption-bottom text-sm">
            <thead class="[&_tr]:border-b">
              <tr class="border-b transition-colors hover:bg-muted/50">
                <th class="h-12 px-4 text-left align-middle font-medium text-muted-foreground">
                  Scope
                </th>
                <th class="h-12 px-4 text-left align-middle font-medium text-muted-foreground">
                  Scope ID
                </th>
                <th class="h-12 px-4 text-left align-middle font-medium text-muted-foreground">
                  Feature
                </th>
                <th class="h-12 px-4 text-left align-middle font-medium text-muted-foreground">
                  Enabled
                </th>
                <th class="h-12 px-4 text-left align-middle font-medium text-muted-foreground">
                  Limit
                </th>
                <th class="h-12 px-4 text-left align-middle font-medium text-muted-foreground">
                  Expires
                </th>
                <th class="h-12 px-4 text-left align-middle font-medium text-muted-foreground">
                  Reason
                </th>
                <th class="h-12 px-4 text-left align-middle font-medium text-muted-foreground">
                  Created
                </th>
              </tr>
            </thead>
            <tbody
              id="table-body"
              class="[&_tr:last-child]:border-0"
              data-testid="table-body"
            ></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      const MOCK_OVERRIDES = [
        {
          id: '1',
          scope: 'ORG',
          scopeId: 'org-1',
          featureKey: 'EXPORT_PDF',
          enabled: true,
          limitValue: null,
          expiresAt: null,
          reason: 'Business need',
          createdAt: '2026-01-15T10:30:00.000Z',
        },
        {
          id: '2',
          scope: 'USER',
          scopeId: 'user-42',
          featureKey: 'MAX_CONNECTORS',
          enabled: true,
          limitValue: 50,
          expiresAt: '2026-12-31T23:59:59.000Z',
          reason: 'Campaign trial',
          createdAt: '2026-06-01T08:00:00.000Z',
        },
        {
          id: '3',
          scope: 'ORG',
          scopeId: 'org-5',
          featureKey: 'AI_SUMMARY',
          enabled: false,
          limitValue: null,
          expiresAt: '2025-01-01T00:00:00.000Z',
          reason: 'Expired trial',
          createdAt: '2025-06-01T08:00:00.000Z',
        },
      ]

      let overrides = [...MOCK_OVERRIDES]
      let filterOrgId = ''

      const scopeBadgeStyles = {
        ORG: 'bg-blue-100 text-blue-800 dark:bg-blue-900/30 dark:text-blue-400 border-blue-200 dark:border-blue-800',
        USER: 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400 border-green-200 dark:border-green-800',
      }

      function formatDate(iso) {
        if (!iso) return '\u2014'
        const d = new Date(iso)
        const day = String(d.getDate()).padStart(2, '0')
        const month = String(d.getMonth() + 1).padStart(2, '0')
        const year = d.getFullYear()
        return `${day}/${month}/${year}`
      }

      function formatExpiryBadge(expiresAt) {
        if (!expiresAt) return '\u2014'
        const now = new Date()
        const exp = new Date(expiresAt)
        const isExpired = exp < now
        const className = isExpired
          ? 'bg-orange-100 text-orange-800 dark:bg-orange-900/30 dark:text-orange-400 border-orange-200 dark:border-orange-800'
          : 'bg-green-100 text-green-800 dark:bg-green-900/30 dark:text-green-400 border-green-200 dark:border-green-800'
        const label = isExpired ? 'Expired' : formatDate(expiresAt)
        return `<span class="inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold transition-colors ${className}">${label}</span>`
      }

      function renderOverrideRow(o) {
        const scopeStyle = scopeBadgeStyles[o.scope] || scopeBadgeStyles.ORG
        const enabledIcon = o.enabled
          ? '<svg class="lucide-check h-4 w-4 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 6L9 17l-5-5"/></svg>'
          : '<svg class="lucide-x h-4 w-4 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 6L6 18M6 6l12 12"/></svg>'
        const limitDisplay =
          o.limitValue !== null && o.limitValue !== undefined ? o.limitValue : '\u2014'

        return `
        <tr class="border-b transition-colors hover:bg-muted/50" data-testid="override-row-${o.id}">
          <td class="p-4 align-middle">
            <span class="inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold transition-colors ${scopeStyle}">${o.scope}</span>
          </td>
          <td class="p-4 align-middle font-mono text-sm">${o.scopeId}</td>
          <td class="p-4 align-middle font-mono text-sm">${o.featureKey}</td>
          <td class="p-4 align-middle">${enabledIcon}</td>
          <td class="p-4 align-middle text-muted-foreground">${limitDisplay}</td>
          <td class="p-4 align-middle">${formatExpiryBadge(o.expiresAt)}</td>
          <td class="p-4 align-middle text-muted-foreground max-w-[200px] truncate">${o.reason}</td>
          <td class="p-4 align-middle text-muted-foreground">${formatDate(o.createdAt)}</td>
        </tr>
      `
      }

      function render() {
        let filtered = overrides
        if (filterOrgId) {
          filtered = filtered.filter((o) => o.scopeId === filterOrgId)
        }

        const tbody = document.getElementById('table-body')

        if (filtered.length === 0) {
          const message = filterOrgId ? 'No overrides found for this organization.' : 'No overrides'
          tbody.innerHTML = `
          <tr>
            <td colspan="8" class="p-4 text-center">
              <div class="flex flex-col items-center justify-center py-12 text-muted-foreground" data-testid="empty-state">
                <p class="text-lg font-medium">${message}</p>
                ${!filterOrgId ? '<p class="text-sm mt-1"><a href="/admin/overrides/new" class="text-primary hover:underline">New Override</a></p>' : ''}
              </div>
            </td>
          </tr>
        `
        } else {
          tbody.innerHTML = filtered.map(renderOverrideRow).join('')
        }

        const desc = document.querySelector('[data-testid="page-description"]')
        if (desc) desc.textContent = `${filtered.length} override${filtered.length > 1 ? 's' : ''}`
      }

      // Filter input
      document.getElementById('filter-input').addEventListener('input', function () {
        filterOrgId = this.value.trim()
        render()
      })

      // Global helpers
      window.__showError = function (message) {
        const banner = document.getElementById('error-banner')
        banner.classList.remove('hidden')
        document.getElementById('error-message').textContent = message
        document.getElementById('table-body').innerHTML = ''
      }

      window.__clearError = function () {
        document.getElementById('error-banner').classList.add('hidden')
      }

      window.__setOverrides = function (newOverrides) {
        overrides = newOverrides
        filterOrgId = ''
        document.getElementById('filter-input').value = ''
        window.__clearError()
        render()
      }

      // Initial render
      render()
    </script>
  </body>
</html>
